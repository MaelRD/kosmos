quarkus.application.name=orbita-board
quarkus.http.port=8081

# Dev services spin up a disposable Postgres container automatically in dev/test mode.
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.flyway.migrate-at-start=true

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.headers=accept,authorization,content-type

# JWT (session tokens issued by our own AuthResource, RS256-signed)
mp.jwt.verify.issuer=https://kosmos.dev/orbita-board
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
kosmos.jwt.expiration-seconds=86400

# Google Sign-In — the ID token's `aud` claim must match this. Create an OAuth 2.0 Client ID
# (Web application) at https://console.cloud.google.com/apis/credentials and set it here (or
# via the GOOGLE_CLIENT_ID env var) before Google login will work.
kosmos.google.client-id=${GOOGLE_CLIENT_ID:207101627090-s15svqjasmala1bb6h4squ4sr96cr0up.apps.googleusercontent.com}
