services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: kosmos
      POSTGRES_USER: kosmos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kosmos}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosmos -d kosmos"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build: ./back
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_USERNAME: kosmos
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD:-kosmos}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/kosmos
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-207101627090-s15svqjasmala1bb6h4squ4sr96cr0up.apps.googleusercontent.com}
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - back

volumes:
  pgdata:
