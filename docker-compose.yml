services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: kosmos
      POSTGRES_USER: kosmos
      POSTGRES_PASSWORD: kosmos
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosmos -d kosmos"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build: ./back
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_USERNAME: kosmos
      QUARKUS_DATASOURCE_PASSWORD: kosmos
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/kosmos
    depends_on:
      db:
        condition: service_healthy

  front:
    build: ./front
    ports:
      - "5173:80"
    depends_on:
      - back

volumes:
  pgdata:
